<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kamera Roman Yosi</title>
<style>
body { margin:0; background:black; color:white; text-align:center; font-family:Arial; }
video { width:100%; max-height:80vh; }
button {
  padding:10px;
  margin:5px;
  background:#00ff99;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
canvas { display:none; }
</style>
</head>
<body>

<h2>KAMERA LIVE</h2>

<video id="video" autoplay playsinline></video>
<br>

<button onclick="startCamera()">🎥 Start Kamera</button>
<button onclick="takePhoto()">📸 Cekrek</button>
<button onclick="openFull()">⛶ Fullscreen</button>

<canvas id="canvas"></canvas>
<img id="photo">

<script>
let video = document.getElementById("video");

function startCamera(){
  navigator.mediaDevices.getUserMedia({ video:true })
  .then(stream => {
    video.srcObject = stream;
  })
}

function takePhoto(){
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  document.getElementById("photo").src = canvas.toDataURL("image/png");
}

function openFull(){
  if(video.requestFullscreen){
    video.requestFullscreen();
  }
}
</script>

</body>
</html>
