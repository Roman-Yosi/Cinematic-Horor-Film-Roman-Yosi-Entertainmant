<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roman Yosi - Cinematic Horror</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

header{
  background:#111;
  padding:15px;
  text-align:center;
}

nav{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

nav a{
  background:#00ff99;
  color:black;
  padding:8px 12px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
}

.hero{
  text-align:center;
  padding:20px;
}

.profile{
  text-align:center;
}

.profile img{
  width:150px;
  height:150px;
  border-radius:50%;
  border:4px solid #00ff99;
  box-shadow:0 0 20px #00ff99;
  object-fit:cover;
}

.feed{
  padding:15px;
}

.feed h2{
  text-align:center;
  color:#00ff99;
}

.video-box{
  background:#1a1a1a;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

iframe{
  width:100%;
  height:250px;
  border:none;
}
</style>

</head>
<body>

<header>
  <h1>ROMAN YOSI</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="article.html">Article</a>
    <a href="about.html">About</a>
    <a href="camera.html">Camera</a>
    <a href="live.html">Live</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="hero">
  <h2>Cinematic Horror Channel</h2>
</div>

<div class="profile">
  <img src="https://raw.githubusercontent.com/Roman-Yosi/Poto-mister-cinema/refs/heads/main/Cinemamisteri.png">
  <h3>Roman Yosi</h3>
</div>

<!-- FEED VIDEO AUTO (RSS) -->
<div class="feed">
  <h2>🔥 Latest Videos</h2>
  <div id="videoFeed">Loading...</div>
</div>

<script>
async function loadFeed(){

  const feeds = [
    "https://www.youtube.com/feeds/videos.xml?channel_id=UCMnig2Zwu_aHwu9LS_2XsgA",
    "https://www.youtube.com/feeds/videos.xml?channel_id=UCUTSzBr1CERM8lB9OTCwrQg"
  ];

  let all = [];

  for(let url of feeds){
    let res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url));
    let data = await res.json();
    if(data.items) all = all.concat(data.items);
  }

  all.sort((a,b)=> new Date(b.pubDate) - new Date(a.pubDate));

  let html = "";

  all.slice(0,8).forEach(v=>{
    let id = v.link.split("v=")[1];

    html += `
      <div class="video-box">
        <h4>${v.title}</h4>
        <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
      </div>
    `;
  });

  document.getElementById("videoFeed").innerHTML = html;
}

loadFeed();
</script>

</body>
</html>
